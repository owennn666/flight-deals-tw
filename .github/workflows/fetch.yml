name: 抓票（每 15 分）

on:
  schedule:
    - cron: "*/15 * * * *"   # 每 15 分鐘（GitHub 排程可能略有延遲）
  workflow_dispatch: {}       # 也可到 Actions 頁手動觸發

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: fetch
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 安裝套件
        run: pip install -r requirements.txt
      - name: 抓票 + 偵測 + 寫入 Supabase
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
          TRAVELPAYOUTS_MARKER: ${{ secrets.TRAVELPAYOUTS_MARKER }}
          TRIP_ALLIANCE_ID: ${{ secrets.TRIP_ALLIANCE_ID }}
          TRIP_SID: ${{ secrets.TRIP_SID }}
        run: python main.py run -c config.prod.yaml
      - name: 失敗告警（設 ALERT_WEBHOOK secret 後生效；未設時 GitHub 仍會 email 通知排程失敗）
        if: failure()
        env:
          ALERT_WEBHOOK: ${{ secrets.ALERT_WEBHOOK }}
        run: |
          if [ -n "$ALERT_WEBHOOK" ]; then
            curl -fsS -X POST -H 'Content-Type: application/json' \
              -d "{\"content\":\"抓票排程失敗：${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
              "$ALERT_WEBHOOK" || true
          else
            echo "未設定 ALERT_WEBHOOK，略過 webhook 告警"
          fi
