name: 保活（防 60 天無 commit 自動停用排程）

# GitHub 對 60 天沒有新 commit 的 repo 會自動停用 scheduled workflows，
# 抓票排程一停、資料就靜默不再更新。每週打一個空 commit 維持活性。
on:
  schedule:
    - cron: "0 3 * * 1"   # 每週一 03:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: 空 commit 保活
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keepalive（維持排程活性）"
          git push
