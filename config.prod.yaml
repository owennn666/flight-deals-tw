# 正式抓票設定（Path A：GitHub Actions 每 15 分跑，寫入 Supabase）。
# DB 連線由環境變數 DATABASE_URL 提供（GitHub Secret，見 SUPABASE_DEPLOY.md）。

routes:
  - [TPE, NRT]
  - [TPE, KIX]
  - [TPE, ICN]
  - [TPE, BKK]
  - [TPE, DAD]
  - [TPE, CDG]
  - [TPE, LHR]

window_days: 90

sources:
  - name: travelpayouts
    params:
      currency: twd
      limit: 100            # 收全部訂票網站（gate）開的價，多樣本取最低
      # 外導改分流：Trip.com 開的價導 Trip 預填頁，其他家導 Aviasales 比價頁
      # marker 由環境變數 TRAVELPAYOUTS_MARKER 提供（變現用）

detectors:
  - name: cheap
  - name: error_fare
    params: { threshold: 0.70 }

notifiers:
  - name: console

# 儲存改用 Supabase Postgres（連線字串由環境變數 DATABASE_URL 提供）
store:
  name: postgres
