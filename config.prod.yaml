# 正式抓票設定（Path A：GitHub Actions 每 15 分跑，寫入 Supabase）。
# DB 連線由環境變數 DATABASE_URL 提供（GitHub Secret，見 SUPABASE_DEPLOY.md）。

routes:
  - [TPE, NRT]
  - [TPE, KIX]
  - [TPE, ICN]
  - [TPE, BKK]
  - [TPE, DAD]
  - [TPE, CDG]
  - [TPE, LHR]

window_days: 90

sources:
  - name: travelpayouts
    params:
      currency: twd
      limit: 100            # 抓多一點再過濾 gate，Trip.com 約佔 2-3 成
      gates: ["Trip.com"]   # 只收 Trip.com 開的價：顯示價格與外導網站同源對齊
      # marker 由環境變數 TRAVELPAYOUTS_MARKER 提供（變現用）

detectors:
  - name: cheap
  - name: error_fare
    params: { threshold: 0.70 }

notifiers:
  - name: console

# 儲存改用 Supabase Postgres（連線字串由環境變數 DATABASE_URL 提供）
store:
  name: postgres
